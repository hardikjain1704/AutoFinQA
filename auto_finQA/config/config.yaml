# config.yaml

mongodb:
  db_name: "autofinqa_db"
  collection_name: "financial_documents"
  index_name: "vector_index"

astra_db:
  collection_name: "financedata"

embedding_model:
  provider: "google"
  model_name: "models/text-embedding-004"

retriever:
  top_k: 5
  fetch_k: 20

llm:
  groq:
    provider: "groq"
    # model_name: "deepseek-r1-distill-llama-70b"
    model_name: "openai/gpt-oss-120b"
    temperature: 0
    max_output_tokens: 2048

  google:
    provider: "google"
    model_name: "gemini-2.0-flash"
    temperature: 0
    max_output_tokens: 2048

  openai:
     provider: "openai"
     model_name: "gpt-4o"
     temperature: 0
